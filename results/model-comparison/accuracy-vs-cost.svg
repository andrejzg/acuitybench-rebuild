  <text class="tick" x="193" y="428.00" text-anchor="end">78%</text>
  <line class="grid" x1="209" y1="344.00" x2="1264" y2="344.00"/>
  <text class="tick" x="193" y="349.00" text-anchor="end">80%</text>
  <line class="grid" x1="209" y1="265.00" x2="1264" y2="265.00"/>
  <text class="tick" x="193" y="270.00" text-anchor="end">82%</text>
  <line class="grid" x1="209" y1="186.00" x2="1264" y2="186.00"/>
  <text class="tick" x="193" y="191.00" text-anchor="end">84%</text>
  <line class="grid" x1="209" y1="107.00" x2="1264" y2="107.00"/>
  <text class="tick" x="193" y="112.00" text-anchor="end">86%</text>
  <text class="tick" x="209.00" y="706" text-anchor="middle">$0</text>
  <text class="tick" x="472.75" y="706" text-anchor="middle">$2</text>
