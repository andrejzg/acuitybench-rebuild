  <text class="axis-label" x="736.50" y="780" text-anchor="middle">Target-model cost per 1,000 calls (USD)</text>
  <text class="axis-label" transform="translate(93 383.50) rotate(-90)" text-anchor="middle">Average accuracy</text>
  <g class="aspirational-marker" data-kind="aspirational">
    <title>Aspirational target, not a measured result.</title>
    <circle class="aspiration-mark" cx="258.58" cy="161.19" r="11"/>
    <text class="aspiration-label" x="281.58" y="168.19">Our trained model?</text>
  </g>
  <g class="point measured-point pareto-point" data-run-id="gpt-5-mini-paper-stream-medium-20260711"><title>GPT-5 mini (gpt-5-mini-paper-stream-medium-20260711): 73.72% average exact; $2.09 / 1k calls; cost telemetry: complete; reasoning effort medium.</title>
    <circle cx="484.97" cy="592.09" r="11"/>
    <text class="point-label" x="502.97" y="628.09" text-anchor="start">GPT-5 mini</text>
  </g>
  <g class="point measured-point pareto-point" data-run-id="gpt-5.4-paper-stream-none-20260711"><title>GPT-5.4 (gpt-5.4-paper-stream-none-20260711): 77.32% average exact; $5.09 / 1k calls; cost telemetry: complete; reasoning effort none.</title>
    <circle cx="879.59" cy="449.68" r="11"/>
    <text class="point-label" x="897.59" y="431.68" text-anchor="start">GPT-5.4</text>
  </g>
</svg>
