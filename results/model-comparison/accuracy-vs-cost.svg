  <text class="axis-label" x="623.00" y="732" text-anchor="middle">Cost per 1,000 successful target-model calls (USD)</text>
  <text class="axis-label" transform="translate(35 387.00) rotate(-90)" text-anchor="middle">Average exact accuracy</text>
  <polyline class="pareto-frontier" points="382.20,465.94 759.99,390.66"/>
  <g class="point measured-point pareto-point" data-run-id="gpt-5-mini-paper-stream-medium-20260711"><title>gpt-5-mini (gpt-5-mini-paper-stream-medium-20260711): 73.72% average exact; $2.09 / 1k calls; cost telemetry: complete; reasoning effort medium.</title>
    <circle cx="382.20" cy="465.94" r="8"/>
    <text class="point-label" x="396.20" y="450.94" text-anchor="start">gpt-5-mini</text>
    <text class="point-value" x="396.20" y="470.94" text-anchor="start">73.7% · $2.09 / 1k calls · effort medium</text>
  </g>
  <g class="point measured-point pareto-point" data-run-id="gpt-5.4-paper-stream-none-20260711"><title>gpt-5.4 (gpt-5.4-paper-stream-none-20260711): 77.32% average exact; $5.09 / 1k calls; cost telemetry: complete; reasoning effort none.</title>
    <circle cx="759.99" cy="390.66" r="8"/>
    <text class="point-label" x="773.99" y="418.66" text-anchor="start">gpt-5.4</text>
    <text class="point-value" x="773.99" y="438.66" text-anchor="start">77.3% · $5.09 / 1k calls · effort none</text>
