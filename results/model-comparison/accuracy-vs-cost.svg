  <text class="tick" x="193" y="586.00" text-anchor="end">74%</text>
  <line class="grid" x1="209" y1="502.00" x2="1264" y2="502.00"/>
  <text class="tick" x="193" y="507.00" text-anchor="end">76%</text>
