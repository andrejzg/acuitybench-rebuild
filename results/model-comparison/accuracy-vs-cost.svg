  <text class="tick" x="102" y="548.60" text-anchor="end">70%</text>
  <line class="grid" x1="118" y1="439.20" x2="1128" y2="439.20"/>
  <text class="tick" x="102" y="444.20" text-anchor="end">75%</text>
  <line class="grid" x1="118" y1="334.80" x2="1128" y2="334.80"/>
  <text class="tick" x="102" y="339.80" text-anchor="end">80%</text>
  <line class="grid" x1="118" y1="230.40" x2="1128" y2="230.40"/>
  <text class="tick" x="102" y="235.40" text-anchor="end">85%</text>
  <line class="grid" x1="118" y1="126.00" x2="1128" y2="126.00"/>
  <text class="tick" x="102" y="131.00" text-anchor="end">90%</text>
