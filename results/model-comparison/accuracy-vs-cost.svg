  <text class="tick" x="118.00" y="680" text-anchor="middle">$0</text>
  <line class="grid" x1="370.50" y1="126" x2="370.50" y2="648"/>
  <text class="tick" x="370.50" y="680" text-anchor="middle">$2</text>
  <line class="grid" x1="623.00" y1="126" x2="623.00" y2="648"/>
  <text class="tick" x="623.00" y="680" text-anchor="middle">$4</text>
  <line class="grid" x1="875.50" y1="126" x2="875.50" y2="648"/>
