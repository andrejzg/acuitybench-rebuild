  <line class="axis" x1="118" y1="126" x2="118" y2="648"/>
  <text class="better" x="132" y="150">BETTER ↖</text>
  <text class="axis-label" x="623.00" y="732" text-anchor="middle">p95 duration macro-average across QA + conversation (seconds)</text>
  <text class="axis-label" transform="translate(35 387.00) rotate(-90)" text-anchor="middle">Average exact accuracy</text>
  <g class="point measured-point pareto-point" data-run-id="gpt-5.4-paper-stream-none-20260711"><title>gpt-5.4 (gpt-5.4-paper-stream-none-20260711): 77.32% average exact; 6.98s p95; client p95 service-latency macro-average; reasoning effort none.</title>
    <circle cx="400.11" cy="390.66" r="8"/>
    <text class="point-label" x="414.11" y="375.66" text-anchor="start">gpt-5.4</text>
    <text class="point-value" x="414.11" y="395.66" text-anchor="start">77.3% · 6.98s p95 · effort none</text>
  </g>
  <g class="point measured-point" data-run-id="gpt-5-mini-paper-stream-medium-20260711"><title>gpt-5-mini (gpt-5-mini-paper-stream-medium-20260711): 73.72% average exact; 17.23s p95; client p95 service-latency macro-average; reasoning effort medium.</title>
    <circle cx="814.25" cy="465.94" r="8"/>
