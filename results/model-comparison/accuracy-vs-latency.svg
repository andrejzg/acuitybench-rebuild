  <text class="tick" x="320.00" y="680" text-anchor="middle">5s</text>
  <line class="grid" x1="522.00" y1="126" x2="522.00" y2="648"/>
  <text class="tick" x="522.00" y="680" text-anchor="middle">10s</text>
  <line class="grid" x1="724.00" y1="126" x2="724.00" y2="648"/>
