<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1368" height="848" viewBox="0 0 1368 848" role="img" aria-labelledby="accuracy-vs-cost-title accuracy-vs-cost-desc">
  <title id="accuracy-vs-cost-title">Average accuracy vs cost</title>
  <desc id="accuracy-vs-cost-desc">Average accuracy vs cost. Gray circles are measured target-model runs; judge cost is excluded. 2 plotted model runs. Lower x and higher accuracy are better. GPT-5 mini (smoke-gpt-5-mini-medium-stream-20260711): 50.00% average exact, $1.43 / 1k calls, cost telemetry: complete, reasoning effort medium. GPT-5.4 (smoke-gpt-5.4-none-stream-20260711): 100.00% average exact, $3.34 / 1k calls, cost telemetry: complete, reasoning effort none. The green Our trained model? marker is an aspirational target, not a measured result.</desc>
  <style>
    :root { --bg:#ffffff; --fg:#4f4946; --muted:#6b6866; --grid:#e7e7e7; --axis:#c5c5c5; --frontier:#9e9e9e; --aspiration:#4a9c7b; --partial:#b7791f; }
    .background{fill:var(--bg)} .legend-label{fill:var(--fg);font:400 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .grid{stroke:var(--grid);stroke-width:1.3} .axis{stroke:var(--axis);stroke-width:1.7} .tick{fill:var(--muted);font:400 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif} .axis-label{fill:var(--fg);font:500 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .point{stroke-width:2.5} .measured-point{fill:var(--frontier);stroke:var(--frontier)} .proxy-point{fill:var(--bg);stroke:var(--frontier)} .partial-point{fill:var(--bg);stroke:var(--partial)} .frontier-legend-mark{fill:var(--frontier)} .aspiration-mark{fill:var(--aspiration)}
    .point-label,.aspiration-label{fill:var(--fg);stroke:var(--bg);stroke-width:4;stroke-linejoin:round;paint-order:stroke fill;font:400 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif} .empty{fill:var(--muted);font:400 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  </style>
  <rect class="background" width="1368" height="848"/>
  <g class="legend" aria-label="Chart legend">
    <circle class="aspiration-mark" cx="114" cy="48" r="11"/>
    <text class="legend-label" x="139" y="56">Our trained model?</text>
    <circle class="frontier-legend-mark" cx="396" cy="48" r="11"/>
    <text class="legend-label" x="421" y="56">Frontier models</text>
  </g>
  <line class="grid" x1="209" y1="660.00" x2="1264" y2="660.00"/>
  <text class="tick" x="193" y="665.00" text-anchor="end">40%</text>
  <line class="grid" x1="209" y1="567.83" x2="1264" y2="567.83"/>
  <text class="tick" x="193" y="572.83" text-anchor="end">50%</text>
  <line class="grid" x1="209" y1="475.67" x2="1264" y2="475.67"/>
  <text class="tick" x="193" y="480.67" text-anchor="end">60%</text>
  <line class="grid" x1="209" y1="383.50" x2="1264" y2="383.50"/>
  <text class="tick" x="193" y="388.50" text-anchor="end">70%</text>
  <line class="grid" x1="209" y1="291.33" x2="1264" y2="291.33"/>
  <text class="tick" x="193" y="296.33" text-anchor="end">80%</text>
  <line class="grid" x1="209" y1="199.17" x2="1264" y2="199.17"/>
  <text class="tick" x="193" y="204.17" text-anchor="end">90%</text>
  <line class="grid" x1="209" y1="107.00" x2="1264" y2="107.00"/>
  <text class="tick" x="193" y="112.00" text-anchor="end">100%</text>
  <text class="tick" x="209.00" y="706" text-anchor="middle">$0</text>
  <text class="tick" x="420.00" y="706" text-anchor="middle">$1</text>
  <text class="tick" x="631.00" y="706" text-anchor="middle">$2</text>
  <text class="tick" x="842.00" y="706" text-anchor="middle">$3</text>
  <text class="tick" x="1053.00" y="706" text-anchor="middle">$4</text>
  <text class="tick" x="1264.00" y="706" text-anchor="middle">$5</text>
  <line class="axis" x1="209" y1="660" x2="1264" y2="660"/>
  <line class="axis" x1="209" y1="107" x2="209" y2="660"/>
  <text class="axis-label" x="736.50" y="780" text-anchor="middle">Target-model cost per 1,000 calls (USD)</text>
  <text class="axis-label" transform="translate(93 383.50) rotate(-90)" text-anchor="middle">Average accuracy</text>
  <g class="aspirational-marker" data-kind="aspirational">
    <title>Aspirational target, not a measured result.</title>
    <circle class="aspiration-mark" cx="258.58" cy="161.19" r="11"/>
    <text class="aspiration-label" x="281.58" y="168.19">Our trained model?</text>
  </g>
  <g class="point measured-point pareto-point" data-run-id="smoke-gpt-5-mini-medium-stream-20260711"><title>GPT-5 mini (smoke-gpt-5-mini-medium-stream-20260711): 50.00% average exact; $1.43 / 1k calls; cost telemetry: complete; reasoning effort medium.</title>
    <circle cx="510.76" cy="567.83" r="11"/>
    <text class="point-label" x="528.76" y="603.83" text-anchor="start">GPT-5 mini</text>
  </g>
  <g class="point measured-point pareto-point" data-run-id="smoke-gpt-5.4-none-stream-20260711"><title>GPT-5.4 (smoke-gpt-5.4-none-stream-20260711): 100.00% average exact; $3.34 / 1k calls; cost telemetry: complete; reasoning effort none.</title>
    <circle cx="914.00" cy="107.00" r="11"/>
    <text class="point-label" x="932.00" y="143.00" text-anchor="start">GPT-5.4</text>
  </g>
</svg>
